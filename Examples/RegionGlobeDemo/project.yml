name: RegionGlobeDemo
options:
  bundleIdPrefix: com.federicodrei
  deploymentTarget:
    iOS: "15.0"
packages:
  RegionGlobe:
    path: ../..
targets:
  RegionGlobeDemo:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: RegionGlobe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.federicodrei.RegionGlobeDemo
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: 1,2
        SWIFT_VERSION: 6.0
